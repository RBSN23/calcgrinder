<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Calcgrinder — Themes</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  html, body { margin:0; padding:0; height:100%; background:#f0eee9;
    font-family: "Geist", -apple-system, BlinkMacSystemFont, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  #root { width:100%; height:100vh; }
  .cg-frame { width:100%; height:100%; overflow:hidden; border-radius:8px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.04); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx?v=1779392295038"></script>
<script type="text/babel" src="chrome.jsx?v=1779392295038"></script>
<script type="text/babel" src="themes.jsx?v=1779392295038"></script>
<script type="text/babel" src="cafe-margin.jsx?v=1779392295038"></script>

<script type="text/babel">
const Frame = (props) => (
  <div className="cg-frame"><ThemedCalculator {...props}/></div>
);

// Per-theme artboard set: 2col desktop, 3col desktop, mobile + Café Margin Studio
const themeRow = (key) => {
  const th = THEMES[key];
  return (
    <DCSection
      id={`theme-${key}`}
      title={th.label}
      subtitle={th.sub}
    >
      <DCArtboard id={`${key}-2col`} label={`${th.label} · 2-column · desktop`}
        width={1280} height={1200}>
        <Frame themeKey={key} layout="2col" viewport="desktop"/>
      </DCArtboard>
      <DCArtboard id={`${key}-3col`} label={`${th.label} · 3-column · desktop`}
        width={1280} height={920}>
        <Frame themeKey={key} layout="3col" viewport="desktop"/>
      </DCArtboard>
      <DCArtboard id={`${key}-mobile`} label={`${th.label} · mobile`}
        width={390} height={1620}>
        <Frame themeKey={key} layout="2col" viewport="mobile"/>
      </DCArtboard>
      <DCArtboard id={`${key}-cafe`} label={`${th.label} · Café Margin Studio · desktop`}
        width={1280} height={4300}>
        <div className="cg-frame"><CafeMarginCalculator themeKey={key} user="registered"/></div>
      </DCArtboard>
    </DCSection>
  );
};

const App = () => (
  <DesignCanvas
    docTitle="Calcgrinder — Themes"
    docSubtitle="Same calculator · 6 themes · 2-col + 3-col + mobile per theme. Light mode only for now."
  >
    {themeRow('editorial')}
    {themeRow('calcgrinder')}
    {themeRow('calcgrinderCI')}
    {themeRow('minimal')}
    {themeRow('bento')}
    {themeRow('bentoGlassy')}
    {themeRow('vessel')}
    {themeRow('terminal')}
  </DesignCanvas>
);

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
